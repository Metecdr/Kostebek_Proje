{% extends 'base.html' %}

{% block title %}Şifre Değiştirildi — Köstebek YKS{% endblock %}

{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:30px 15px;">
    <div style="max-width:440px;width:100%;background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:24px;padding:40px 36px;text-align:center;">
        <div style="font-size:3.5rem;margin-bottom:16px;">✅</div>
        <h2 style="font-size:1.4rem;font-weight:900;color:var(--text-primary);margin-bottom:10px;">Şifren Değiştirildi!</h2>
        <p style="color:var(--text-muted);font-size:0.92rem;line-height:1.6;margin-bottom:28px;">
            Yeni şifrenle artık giriş yapabilirsin.
        </p>
        <a href="{% url 'giris' %}"
           style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:14px 36px;border-radius:14px;font-weight:700;font-size:1rem;text-decoration:none;">
            <i class="bi bi-box-arrow-in-right"></i> Giriş Yap
        </a>
    </div>
</div>
{% endblock %}
