{% extends 'base.html' %}
{% load static %}

{% block title %}Şifremi Unuttum — Köstebek YKS{% endblock %}

{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:30px 15px;">
    <div style="max-width:440px;width:100%;background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:24px;padding:40px 36px;">

        <div style="text-align:center;margin-bottom:28px;">
            <div style="font-size:3rem;margin-bottom:12px;">🔑</div>
            <h2 style="font-size:1.4rem;font-weight:900;color:var(--text-primary);margin-bottom:6px;">Şifreni Sıfırla</h2>
            <p style="color:var(--text-muted);font-size:0.9rem;line-height:1.5;">
                Kayıtlı email adresini gir, sana sıfırlama linki gönderelim.
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom:20px;">
                <label style="display:block;font-weight:700;color:var(--text-primary);margin-bottom:8px;font-size:0.9rem;">
                    <i class="bi bi-envelope-fill" style="color:#667eea;margin-right:6px;"></i>Email Adresi
                </label>
                <input type="email" name="email" required
                       placeholder="isim@gmail.com"
                       style="width:100%;padding:12px 16px;background:var(--bg-secondary);border:1.5px solid var(--card-border);border-radius:12px;color:var(--text-primary);font-size:0.95rem;box-sizing:border-box;outline:none;transition:border-color .2s;"
                       onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor=''">
            </div>
            <button type="submit"
                    style="width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:14px;border-radius:14px;font-weight:700;font-size:1rem;cursor:pointer;">
                <i class="bi bi-send-fill"></i> Sıfırlama Linki Gönder
            </button>
        </form>

        <div style="text-align:center;margin-top:20px;">
            <a href="{% url 'giris' %}" style="color:var(--text-muted);font-size:0.88rem;text-decoration:none;">
                ← Giriş sayfasına dön
            </a>
        </div>
    </div>
</div>
{% endblock %}
